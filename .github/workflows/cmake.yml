name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-15, macos-15-intel, windows-latest, ubuntu-latest]
        build_type: [Release]

    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}

    steps:
    - name: List Xcode installations
      if: matrix.os == 'macos-15' || matrix.os == 'macos-15-intel'
      run: sudo ls -1 /Applications | grep "Xcode"

    - name: Select Xcode 16.4
      if: matrix.os == 'macos-15' || matrix.os == 'macos-15-intel'
      run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache CPM dependencies
      uses: actions/cache@v4
      with:
        path: ${{github.workspace}}/libs
        key: cpm-deps-${{ runner.os }}-${{ hashFiles('cmake/cpm.cmake', 'CMakeLists.txt') }}
        restore-keys: |
          cpm-deps-${{ runner.os }}-

    - name: Setup vcpkg (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
      shell: bash

    - name: Setup vcpkg (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
      shell: cmd

    - name: Install JUCE dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libfreetype6-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libgl1-mesa-dev \
          pkg-config

    - name: Configure CMake (macOS ARM64)
      if: matrix.os == 'macos-15'
      run: cmake -S . -B ${{github.workspace}}/build 
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=arm64-osx
            -DCMAKE_CXX_FLAGS="-Wno-error"

    - name: Configure CMake (macOS x64)
      if: matrix.os == 'macos-15-intel'
      run: cmake -S . -B ${{github.workspace}}/build 
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=x64-osx
            -DCMAKE_CXX_FLAGS="-Wno-error"

    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B ${{github.workspace}}/build 
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_CXX_FLAGS="-Wno-error"

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B ${{github.workspace}}/build 
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_CXX_FLAGS="/WX-"

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{ matrix.build_type }}

    - name: Fix JUCE trailing commas
      shell: bash # Forces Windows to use bash/sh-like behavior for python -c
      run: |
        python3 -c "
        import os, re
        for root, dirs, files in os.walk('${{ github.workspace }}/build'):
            for file in files:
                if file == 'moduleinfo.json':
                    path = os.path.join(root, file)
                    with open(path, 'r+') as f:
                        text = f.read()
                        fixed = re.sub(r',(\s*[\]}])', r'\1', text)
                        f.seek(0)
                        f.write(fixed)
                        f.truncate()
        "

    - name: Upload VST3 artifact
      uses: actions/upload-artifact@v4
      with:
        name: XenRoll-${{ matrix.os == 'macos-15' && 'macOS-arm64' || matrix.os == 'macos-15-intel' && 'macOS-x64' || matrix.os == 'windows-latest' && 'windows' || 'linux_x86_64' }}-${{ matrix.build_type }}
        path: |
          ${{github.workspace}}/build/**/XenRoll.vst3/**
          ${{github.workspace}}/build/XenRoll_artefacts/**/VST3/*.vst3/**
        if-no-files-found: warn

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{ matrix.build_type }}

