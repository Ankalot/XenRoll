name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        build_type: [Debug, Release]

    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}

    steps:
    - name: List Xcode installations
      if: matrix.os == 'macos-14'
      run: sudo ls -1 /Applications | grep "Xcode"
    - name: Select Xcode 16.2
      if: matrix.os == 'macos-14'
      run: sudo xcode-select -s /Applications/Xcode_16.2.0.app/Contents/Developer
    - uses: actions/checkout@v4
      with:
        submodules: recursive  # ← This ensures Eigen is fetched

    - name: Cache CPM dependencies
      uses: actions/cache@v4
      with:
        path: ${{github.workspace}}/libs
        key: cpm-deps-${{ runner.os }}-${{ hashFiles('cmake/cpm.cmake', 'CMakeLists.txt') }}
        restore-keys: |
          cpm-deps-${{ runner.os }}-

    - name: Install Boost (Windows)
      if: matrix.os == 'windows-latest'
      uses: MarkusJx/install-boost@v2.4.5
      id: install-boost-windows
      with:
        boost_version: 1.86.0
        platform_version: 2022
        toolset: msvc

    - name: Install Boost (macOS)
      if: matrix.os == 'macos-14'
      run: brew install boost

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libfreetype6-dev libgl1-mesa-dev

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBOOST_ROOT=${{ steps.install-boost-windows.outputs.BOOST_ROOT }}

    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-14'
      run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{ matrix.build_type }}

